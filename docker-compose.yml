version: "3.8"

# ============================================================
# RTMPayServer — BTCPayServer with native Raptoreum (RTM) support
# https://github.com/cadenadb/rtmpayserver
#
# Custom Docker image: ghcr.io/cadenadb/btcpayserver-rtm:latest
# Source:              https://github.com/cadenadb/btcpayserver
#
# Quick start:
#   cp .env.example .env && nano .env
#   docker compose up -d
#
# Requires an external Raptoreum full node OR use the built-in
# rtmpay-raptoreumd service (uncomment below).
# ============================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  rtmpay-postgres:
    image: postgres:16-alpine
    container_name: rtmpay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: btcpaydb
      POSTGRES_USER: btcpay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - rtmpay_postgres:/var/lib/postgresql/data
    networks:
      - rtmpay-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U btcpay"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NBXplorer with RTM support ──────────────────────────────
  # Custom fork: https://github.com/cadenadb/NBXplorer
  rtmpay-nbxplorer-rtm:
    image: ghcr.io/cadenadb/nbxplorer-rtm:latest
    container_name: rtmpay-nbxplorer-rtm
    restart: unless-stopped
    depends_on:
      rtmpay-postgres:
        condition: service_healthy
    networks:
      - rtmpay-net
    environment:
      NBXPLORER_NETWORK: ${BTCPAY_NETWORK:-mainnet}
      NBXPLORER_CHAINS: rtm
      NBXPLORER_RTMRPCURL: http://${RTM_NODE_HOST:-rtmpay-raptoreumd}:${RTM_RPC_PORT:-10225}/
      NBXPLORER_RTMRPCUSER: ${RTM_RPC_USER}
      NBXPLORER_RTMRPCPASSWORD: ${RTM_RPC_PASSWORD}
      NBXPLORER_RTMNODEENDPOINT: ${RTM_NODE_HOST:-rtmpay-raptoreumd}:${RTM_P2P_PORT:-10226}
      NBXPLORER_POSTGRES: "User ID=btcpay;Password=${POSTGRES_PASSWORD};Host=rtmpay-postgres;Port=5432;Database=nbxplorer"
      NBXPLORER_NOAUTH: "1"
      NBXPLORER_BIND: 0.0.0.0
      NBXPLORER_PORT: "24447"
    volumes:
      - rtmpay_nbxplorer_rtm:/datadir

  # ── BTCPayServer with RTM plugin ────────────────────────────
  # Custom image: https://github.com/cadenadb/btcpayserver
  rtmpay-btcpayserver:
    image: ghcr.io/cadenadb/btcpayserver-rtm:latest
    container_name: rtmpay-btcpayserver
    restart: unless-stopped
    depends_on:
      - rtmpay-nbxplorer-rtm
    networks:
      - rtmpay-net
    ports:
      - "${BTCPAY_PORT:-23001}:3000"
    environment:
      BTCPAY_NETWORK: ${BTCPAY_NETWORK:-mainnet}
      BTCPAY_CHAINS: rtm
      BTCPAY_POSTGRES: "User ID=btcpay;Password=${POSTGRES_PASSWORD};Host=rtmpay-postgres;Port=5432;Database=btcpaydb"
      BTCPAY_EXPLORERPOSTGRES: "User ID=btcpay;Password=${POSTGRES_PASSWORD};Host=rtmpay-postgres;Port=5432;Database=nbxplorer"
      BTCPAY_RTMEXPLORERURL: http://rtmpay-nbxplorer-rtm:24447/
      BTCPAY_HOST: ${BTCPAY_HOST}
      ASPNETCORE_URLS: http://0.0.0.0:3000
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
    volumes:
      - rtmpay_btcpay:/datadir

  # ── Raptoreum full node ─────────────────────────────────────
  # Uncomment to run a local RTM node. Requires ~10 GB disk for blockchain.
  # If you already have an external RTM node, set RTM_NODE_HOST in .env
  # and leave this commented out.
  #
  # rtmpay-raptoreumd:
  #   image: ghcr.io/cadenadb/raptoreumd:latest
  #   container_name: rtmpay-raptoreumd
  #   restart: unless-stopped
  #   networks:
  #     - rtmpay-net
  #   command: >
  #     -rpcuser=${RTM_RPC_USER}
  #     -rpcpassword=${RTM_RPC_PASSWORD}
  #     -rpcbind=0.0.0.0
  #     -rpcallowip=0.0.0.0/0
  #     -rpcport=10225
  #     -port=10226
  #     -txindex=1
  #     -server=1
  #   volumes:
  #     - rtmpay_raptoreum:/root/.raptoreumcore
  #   ports:
  #     - "10226:10226"

networks:
  rtmpay-net:
    driver: bridge

volumes:
  rtmpay_postgres:
  rtmpay_nbxplorer_rtm:
  rtmpay_btcpay:
  # rtmpay_raptoreum:
