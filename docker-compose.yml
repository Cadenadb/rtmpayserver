version: "3.8"

# ============================================================
# RTMPayServer — BTCPayServer with native Raptoreum (RTM) support
# https://github.com/cadenadb/rtmpayserver
#
# Copy .env.example to .env and fill in your values before running:
#   cp .env.example .env && nano .env
#   docker compose up -d
# ============================================================

services:

  # ── PostgreSQL database ─────────────────────────────────────
  rtmpay-postgres:
    image: postgres:16-alpine
    container_name: rtmpay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: btcpaydb
      POSTGRES_USER: btcpay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - rtmpay_postgres:/var/lib/postgresql/data
    networks:
      - rtmpay-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U btcpay"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Bitcoin Core (for Lightning Network support) ─────────────
  rtmpay-bitcoind:
    image: btcpayserver/bitcoin:31.0
    container_name: rtmpay-bitcoind
    restart: unless-stopped
    networks:
      - rtmpay-net
    environment:
      BITCOIN_NETWORK: ${BITCOIN_NETWORK:-mainnet}
      BITCOIN_EXTRA_ARGS: |
        rpcuser=${BTC_RPC_USER}
        rpcpassword=${BTC_RPC_PASSWORD}
        rpcallowip=0.0.0.0/0
        rpcbind=0.0.0.0
        server=1
        txindex=1
        fallbackfee=0.0002
        listen=1
        whitelist=0.0.0.0/0
    volumes:
      - rtmpay_bitcoin:/data

  # ── NBXplorer with RTM support (custom image) ───────────────
  # Source: https://github.com/cadenadb/NBXplorer
  rtmpay-nbxplorer:
    image: ghcr.io/cadenadb/nbxplorer-rtm:latest
    container_name: rtmpay-nbxplorer
    restart: unless-stopped
    depends_on:
      rtmpay-postgres:
        condition: service_healthy
      rtmpay-bitcoind:
        condition: service_started
    networks:
      - rtmpay-net
    environment:
      NBXPLORER_NETWORK: ${BITCOIN_NETWORK:-mainnet}
      NBXPLORER_CHAINS: btc
      NBXPLORER_BTCRPCURL: http://rtmpay-bitcoind:${BTC_RPC_PORT:-8332}/
      NBXPLORER_BTCRPCUSER: ${BTC_RPC_USER}
      NBXPLORER_BTCRPCPASSWORD: ${BTC_RPC_PASSWORD}
      NBXPLORER_BTCNODEENDPOINT: rtmpay-bitcoind:${BTC_P2P_PORT:-8333}
      NBXPLORER_POSTGRES: "User ID=btcpay;Password=${POSTGRES_PASSWORD};Host=rtmpay-postgres;Port=5432;Database=nbxplorer"
      NBXPLORER_NOAUTH: "1"
      NBXPLORER_BIND: 0.0.0.0
      NBXPLORER_PORT: "24446"
    volumes:
      - rtmpay_nbxplorer:/datadir

  # ── BTCPayServer ────────────────────────────────────────────
  rtmpay-btcpayserver:
    image: btcpayserver/btcpayserver:2.3.9
    container_name: rtmpay-btcpayserver
    restart: unless-stopped
    depends_on:
      - rtmpay-nbxplorer
    networks:
      - rtmpay-net
    ports:
      - "${BTCPAY_PORT:-23001}:3000"
    environment:
      BTCPAY_NETWORK: ${BITCOIN_NETWORK:-mainnet}
      BTCPAY_CHAINS: btc
      BTCPAY_POSTGRES: "User ID=btcpay;Password=${POSTGRES_PASSWORD};Host=rtmpay-postgres;Port=5432;Database=btcpaydb"
      BTCPAY_EXPLORERPOSTGRES: "User ID=btcpay;Password=${POSTGRES_PASSWORD};Host=rtmpay-postgres;Port=5432;Database=nbxplorer"
      BTCPAY_BTCEXPLORERURL: http://rtmpay-nbxplorer:24446/
      BTCPAY_HOST: ${BTCPAY_HOST}
      ASPNETCORE_URLS: http://0.0.0.0:3000
    volumes:
      - rtmpay_btcpay:/datadir

  # ── Raptoreum full node (optional, for RTM payments) ────────
  # Uncomment this block to enable native RTM payment processing.
  # Make sure to also add 'rtmpay-raptoreumd' to the
  # NBXPLORER_CHAINS env var above (e.g. "btc,rtm") and set
  # the NBXPLORER_RTM* variables.
  #
  # rtmpay-raptoreumd:
  #   image: ghcr.io/cadenadb/raptoreumd:latest
  #   container_name: rtmpay-raptoreumd
  #   restart: unless-stopped
  #   networks:
  #     - rtmpay-net
  #   environment:
  #     - RTM_RPC_USER=${RTM_RPC_USER}
  #     - RTM_RPC_PASSWORD=${RTM_RPC_PASSWORD}
  #   volumes:
  #     - rtmpay_raptoreum:/root/.raptoreumcore
  #   ports:
  #     - "10226:10226"   # P2P (optional, for full node participation)

networks:
  rtmpay-net:
    driver: bridge

volumes:
  rtmpay_postgres:
  rtmpay_bitcoin:
  rtmpay_nbxplorer:
  rtmpay_btcpay:
  # rtmpay_raptoreum:
